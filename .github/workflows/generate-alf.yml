name: Generate Unity Activation Request

on:
  workflow_dispatch:

jobs:
  generate-alf:
    name: Generate Activation File
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Generate Unity ALF File
        run: |
          docker pull unityci/editor:ubuntu-2022.3.72f1-android-3.2.1
          docker run --rm -v /tmp:/output unityci/editor:ubuntu-2022.3.72f1-android-3.2.1 \
            bash -c '
              UNITY=$(find / -name "Unity" -type f -executable 2>/dev/null | grep -E "Editor/Unity$" | head -1)
              echo "Unity path: $UNITY"
              if [ -n "$UNITY" ]; then
                "$UNITY" -batchmode -nographics -createManualActivationFile -logFile /dev/stdout -quit 2>&1 || true
                ALF=$(find / -name "*.alf" -not -path "/proc/*" -not -path "/sys/*" 2>/dev/null | head -1)
                if [ -n "$ALF" ]; then
                  echo "Found ALF: $ALF"
                  cp "$ALF" /output/Unity_v2.alf
                  echo "ALF copied to /output/Unity_v2.alf"
                else
                  echo "No ALF file generated"
                fi
              else
                echo "Unity executable not found"
              fi
            '

      - name: Check for ALF File
        run: |
          ls -la /tmp/Unity_v2.alf 2>/dev/null || echo "ALF not found"
          if [ -f /tmp/Unity_v2.alf ]; then
            echo "=== ALF File Contents ==="
            cat /tmp/Unity_v2.alf
          fi

      - name: Upload Activation File
        uses: actions/upload-artifact@v4
        with:
          name: UnityActivationFile
          path: /tmp/Unity_v2.alf
          if-no-files-found: warn
          retention-days: 30
