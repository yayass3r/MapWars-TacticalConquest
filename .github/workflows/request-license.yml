name: Request Unity License

# This workflow helps you obtain a Unity license for CI/CD.
# For Personal accounts with 2FA:
#   1. Run the "Generate Unity Activation Request" workflow first
#   2. Download the 'UnityActivationFile' artifact
#   3. Visit https://license.unity3d.com/manual and upload the .alf file
#   4. Log in with your Unity account (complete 2FA if needed)
#   5. Select "Unity Personal" edition and download the .ulf license file
#   6. Go to repo Settings > Secrets and variables > Actions
#   7. Add a new secret called UNITY_LICENSE with the full contents of the .ulf file
#   8. Run the "Build Android APK" workflow

on:
  workflow_dispatch:
    inputs:
      unityVersion:
        description: 'Unity version (e.g. 2022.3.72f1)'
        required: false
        default: '2022.3.72f1'

jobs:
  request-license:
    name: Request Unity License File
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Generate Unity ALF File
        run: |
          docker pull unityci/editor:ubuntu-2022.3.72f1-android-3.2.1
          docker run --rm -v /tmp:/output unityci/editor:ubuntu-2022.3.72f1-android-3.2.1 \
            bash -c '
              UNITY=$(find / -name "Unity" -type f -executable 2>/dev/null | grep -E "Editor/Unity$" | head -1)
              if [ -n "$UNITY" ]; then
                "$UNITY" -batchmode -nographics -createManualActivationFile -logFile /dev/stdout -quit 2>&1 || true
                ALF=$(find / -name "*.alf" -not -path "/proc/*" -not -path "/sys/*" 2>/dev/null | head -1)
                if [ -n "$ALF" ]; then
                  cp "$ALF" /output/Unity_v2.alf
                fi
              fi
            '

      - name: Upload Activation File
        uses: actions/upload-artifact@v4
        with:
          name: activation-request
          path: /tmp/Unity_v2.alf
          retention-days: 7

      - name: Print Instructions
        run: |
          echo "============================================"
          echo "  UNITY LICENSE ACTIVATION INSTRUCTIONS"
          echo "============================================"
          echo ""
          echo "Step 1: Download the 'activation-request' artifact from this workflow run"
          echo "Step 2: Visit https://license.unity3d.com/manual"
          echo "Step 3: Upload the .alf file you downloaded"
          echo "Step 4: Log in with your Unity account (complete 2FA if needed)"
          echo "Step 5: Select 'Unity Personal' edition and download the .ulf license file"
          echo "Step 6: Go to repo Settings > Secrets and variables > Actions"
          echo "Step 7: Create a secret named UNITY_LICENSE with the .ulf file contents"
          echo "Step 8: Run the 'Build Android APK' workflow"
          echo ""
          echo "============================================"
