name: Build Android APK

on:
  push:
    branches: [ main, develop ]
    tags: ['v*']
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      checks: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: unity-lib-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            unity-lib-

      - name: Activate Unity License
        run: |
          docker pull unityci/editor:ubuntu-2022.3.72f1-android-3.2.1
          mkdir -p /tmp/unity-license
          docker run --rm \
            -e UNITY_EMAIL="${{ secrets.UNITY_EMAIL }}" \
            -e UNITY_PASSWORD="${{ secrets.UNITY_PASSWORD }}" \
            -v /tmp/unity-license:/license \
            unityci/editor:ubuntu-2022.3.72f1-android-3.2.1 \
            bash -c '
              UNITY=$(find / -name "Unity" -type f -executable 2>/dev/null | grep -E "Editor/Unity$" | head -1)
              echo "Unity path: $UNITY"
              if [ -z "$UNITY" ]; then
                echo "ERROR: Unity executable not found"
                exit 1
              fi
              "$UNITY" -batchmode -nographics -quit \
                -username "$UNITY_EMAIL" -password "$UNITY_PASSWORD" \
                -logFile /dev/stdout 2>&1 || true
              echo "=== Looking for license files ==="
              find /root/.local/share/unity3d -name "*.ulf" 2>/dev/null
              find /root/.config/unity3d -name "*.ulf" 2>/dev/null
              # Copy all license-related files
              cp -r /root/.local/share/unity3d/ /license/ 2>/dev/null || true
              cp -r /root/.config/unity3d/ /license/ 2>/dev/null || true
              find /root -name "*.ulf" -exec cp {} /license/ 2>/dev/null || true
              ls -laR /license/ 2>/dev/null
              echo "=== Done ==="
            '

      - name: Build Unity Project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          targetPlatform: Android
          projectPath: .
          unityVersion: 2022.3.72f1
          buildMethod: MapWars.Editor.BuildScript.BuildAndroid
          customParameters: -developmentMode false -exportPath build/

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MapWars-APK
          path: build/**/*.apk
          if-no-files-found: warn

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/**/*.apk
          generate_release_notes: true
          draft: true

      - name: Upload Build Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            /home/runner/work/**/*.log
          if-no-files-found: warn
