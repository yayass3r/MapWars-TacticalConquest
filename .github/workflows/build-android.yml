name: Build Android APK

on:
  push:
    branches: [ main, develop ]
    tags: ['v*']
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      checks: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: unity-lib-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            unity-lib-

      - name: Activate Unity License
        run: |
          docker pull unityci/editor:ubuntu-2022.3.72f1-android-3.2.1
          docker run --rm \
            -e UNITY_EMAIL="${{ secrets.UNITY_EMAIL }}" \
            -e UNITY_PASSWORD="${{ secrets.UNITY_PASSWORD }}" \
            unityci/editor:ubuntu-2022.3.72f1-android-3.2.1 \
            /opt/Unity/Editor/Unity -batchmode -nographics -quit -logFile - \
            -username "$UNITY_EMAIL" -password "$UNITY_PASSWORD" 2>&1 || true
          # Find and save the license
          docker run --rm -v $HOME:/output unityci/editor:ubuntu-2022.3.72f1-android-3.2.1 \
            bash -c 'cp -r /root/.local/share/unity3d/Unity /output/.local_share_unity3d 2>/dev/null || true; find /root/.config -name "*.ulf" -exec cp {} /output/ 2>/dev/null || true; find / -name "*.ulf" -not -path "/proc/*" -not -path "/sys/*" 2>/dev/null | head -5'
          echo "License activation attempted"

      - name: Build Unity Project
        uses: game-ci/unity-builder@v4
        with:
          targetPlatform: Android
          projectPath: .
          unityVersion: 2022.3.72f1
          buildMethod: MapWars.Editor.BuildScript.BuildAndroid
          customParameters: -developmentMode false -exportPath build/
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MapWars-APK
          path: build/**/*.apk
          if-no-files-found: warn

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/**/*.apk
          generate_release_notes: true
          draft: true

      - name: Upload Build Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            /home/runner/work/**/*.log
          if-no-files-found: warn
