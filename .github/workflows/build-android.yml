name: Build Android APK

on:
  push:
    branches: [ main, develop ]
    tags: ['v*']
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      unityVersion:
        description: 'Unity version (e.g. 2022.3.20f1)'
        required: false
        default: '2022.3.20f1'

env:
  UNITY_VERSION: ${{ github.event.inputs.unityVersion || '2022.3.20f1' }}
  PROJECT_PATH: .

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      checks: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: unity-library-${{ env.UNITY_VERSION }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            unity-library-${{ env.UNITY_VERSION }}-
            unity-library-

      - name: Activate Unity License
        uses: game-ci/unity-activate@v2
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Build Unity Project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          targetPlatform: Android
          projectPath: ${{ env.PROJECT_PATH }}
          unityVersion: ${{ env.UNITY_VERSION }}
          buildMethod: MapWars.Editor.BuildScript.BuildAndroid
          customParameters: -developmentMode false -exportPath build/

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MapWars-APK
          path: build/**/*.apk
          if-no-files-found: error

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/**/*.apk
          generate_release_notes: true
          draft: true
