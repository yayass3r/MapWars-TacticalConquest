name: Build Android APK

on:
  push:
    branches: [ main, develop ]
    tags: [-v']
   pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      checks: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: unity-lib-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            unity-lib-

      - name: Activate Unity License
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        run: |
          docker pull unityci/editor:ubuntu-2022.3.72f1-android-3.2.1
          mkdir -p /tmp/unity-lic
          docker run --rm \
            -e UNITY_EMAIL\
            -e UNITY_PASSWORD\
            -v /tmp/unity-lic:/output \
            unityci/editor:ubuntu-2022.3.72f1-android-3.2.1 \
            bash -c '
              echo "Email length: ${#UNITY_EMAIL}"
              echo "Password length: ${#UNITY_PASSWORD}"
              echo "Password first char: ${UNITY_PASSWORD:0:1}"
              
              UNITY=$(find / -name "Unity" -type f -executable 2>/dev/null | grep -E "Editor/Unity$" | head -1)
              echo "Unity path: $UNITY"
              
              if [ -z "$UNITY" ]; then
                echo "ERROR: Unity not found"
                exit 1
              fi
              
              # URL-encode password using Python (reads env var directly)
              ENCODED_PASS=$(python3 -c "import urllib.parse,os; print(urllib.parse.quote(os.environ['UNITY_PASSWORD'], safe=''))"))
              echo "Encoded password length: ${#ENCODED_PASS}"
              
              # Activate with CLI args
              "$UNITY" -batchmode -nographics -quit \
                -username "$UNITY_EMAIL" -password "$ENCODED_PASS" \
                -logFile /tmp/unity.log 2>&1 || true
              echo "=== Activation log ==="
              cat /tmp/unity.log 2>/dev/null | tail -50 || true
              
              # Copy all license data
              cp -r /root/.local/share/unity3d /output/local_share 2>/dev/null || true
              cp -r /root/.config/unity3d /output/config 2>/dev/null || true
              cp -r /root/.cache/unity3d /output/cache 2>/dev/null || true
              find /root -name "*.ulf" -exec cp {} /output/ 2>/dev/null || true
              find /output -type f 2>/dev/null | head -20
            ''
          echo "=== Host files ==="
          find /tmp/unity-lic -type f 2>/dev/null | head -20
          # Check for ULF
          ULF=$(find /tmp/unity-lic -name "*.ulf" -type f 2>/dev/null | head -1)
          if [ -n "$ULF" ]; then
            echo "ULF found: $ULF"
            echo "ULF_CONTENT<<EOF" >> $GITHUB_ENV
            cat "$ULF" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "No ULF file found on host"
          fi

      - name: Build Unity Project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ env.ULF_CONTENT }}
        with:
          targetPlatform: Android
          projectPath: .
          unityVersion: 2022.3.72f1
          buildMethod: MapWars.Editor.BuildScript.BuildAndroid
          customParameters: -developmentMode false -exportPath build/

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MapWars-APK
          path: build/**/*.apk
          if-no-files-found: warn

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/**/*.apk
          generate_release_notes: true
          draft: true

      - name: Upload Build Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            /home/runner/work/**/*.log
          if-no-files-found: warn
