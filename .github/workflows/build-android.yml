name: Build Android APK

on:
  push:
    branches: [ main, develop ]
    tags: ['v*']
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      checks: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: unity-lib-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            unity-lib-

      - name: Activate Unity License via Docker
        run: |
          docker pull unityci/editor:ubuntu-2022.3.72f1-android-3.2.1
          mkdir -p /tmp/unity-lic
          docker run --rm \
            -e UNITY_EMAIL="${{ secrets.UNITY_EMAIL }}" \
            -e UNITY_PASSWORD="${{ secrets.UNITY_PASSWORD }}" \
            -v /tmp/unity-lic:/output \
            unityci/editor:ubuntu-2022.3.72f1-android-3.2.1 \
            bash -c '
              UNITY=$(find / -name "Unity" -type f -executable 2>/dev/null | grep -E "Editor/Unity$" | head -1)
              echo "Unity path: $UNITY"
              "$UNITY" -batchmode -nographics -quit \
                -username "${UNITY_EMAIL}" -password "${UNITY_PASSWORD}" \
                -logFile /dev/stdout 2>&1 || true
              # Copy license files to output
              find /root/.local/share/unity3d -type f -name "*.ulf" -exec cp {} /output/ 2>/dev/null || true
              find /root/.config/unity3d -type f -name "*.ulf" -exec cp {} /output/ 2>/dev/null || true
              find /root -maxdepth 5 -type f -name "*.ulf" -exec cp {} /output/ 2>/dev/null || true
              echo "=== License files ==="
              ls -la /output/ 2>/dev/null || echo "No license files found"
              # Also copy the entire Unity license directory
              if [ -d /root/.local/share/unity3d ]; then
                cp -r /root/.local/share/unity3d /output/unity3d_share 2>/dev/null || true
              fi
            '
          # Find the ULF file
          echo "=== Checking output ==="
          ls -la /tmp/unity-lic/
          ULF_FILE=$(find /tmp/unity-lic -name "*.ulf" -type f 2>/dev/null | head -1)
          if [ -n "$ULF_FILE" ]; then
            echo "Found ULF: $ULF_FILE"
            echo "ULF_CONTENT<<EOF" >> $GITHUB_ENV
            cat "$ULF_FILE" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
            echo "License saved to UNITY_LICENSE env var"
          else
            echo "WARNING: No ULF file found"
          fi

      - name: Build Unity Project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ env.ULF_CONTENT }}
        with:
          targetPlatform: Android
          projectPath: .
          unityVersion: 2022.3.72f1
          buildMethod: MapWars.Editor.BuildScript.BuildAndroid
          customParameters: -developmentMode false -exportPath build/

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MapWars-APK
          path: build/**/*.apk
          if-no-files-found: warn

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/**/*.apk
          generate_release_notes: true
          draft: true

      - name: Upload Build Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            /home/runner/work/**/*.log
          if-no-files-found: warn
